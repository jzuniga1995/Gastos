<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F7F4EF">
<title>MisGastos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap');

:root {
  --bg:        #F7F4EF;
  --bg2:       #EFEAE2;
  --white:     #FFFFFF;
  --border:    #E2DBD0;
  --text:      #1A1612;
  --muted:     #9B8F82;
  --food:      #E07B39;
  --food-bg:   #FEF0E6;
  --food-soft: #FBDEC7;
  --med:       #3A8C74;
  --med-bg:    #E6F4EF;
  --med-soft:  #C0E2D9;
  --total:     #2E5FA3;
  --total-bg:  #EBF1FB;
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.10);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.14);
  --radius:    20px;
  --radius-sm: 12px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%;
  overflow-x: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 16px;
}

body { padding-bottom: env(safe-area-inset-bottom); }

.app {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* ── TOP BAR ── */
.topbar {
  background: var(--white);
  padding: 54px 24px 20px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 50;
}

.topbar-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.topbar h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.5px;
}

.topbar h1 em {
  font-style: italic;
  color: var(--food);
}

.topbar-date {
  font-size: 0.72rem;
  color: var(--muted);
  font-weight: 400;
  margin-top: 2px;
}

.btn-icon {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--bg);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 1.1rem;
  transition: background 0.15s;
}
.btn-icon:active { background: var(--border); }

/* ── SCROLL AREA ── */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 20px 16px 120px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* ── SUMMARY CARDS ── */
.cards-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.stat-card {
  border-radius: var(--radius);
  padding: 18px 16px;
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.4s ease both;
}

.stat-card.total {
  grid-column: span 2;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 22px;
  background: var(--total-bg);
}

.stat-icon { font-size: 1.5rem; margin-bottom: 8px; }

.stat-label {
  font-size: 0.67rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.stat-card.total .stat-label { color: var(--total); }

.stat-amount {
  font-family: 'Playfair Display', serif;
  font-size: 1.45rem;
  font-weight: 700;
  letter-spacing: -0.5px;
  line-height: 1;
}

.stat-card.total .stat-amount { color: var(--total); font-size: 1.9rem; }

.stat-count {
  font-size: 0.67rem;
  color: var(--muted);
  margin-top: 5px;
  font-weight: 400;
}

.total-right { text-align: right; }

/* Dynamic category cards */
.dyn-card {
  border-radius: var(--radius);
  padding: 18px 16px;
  animation: fadeUp 0.4s ease both;
}

/* ── SECTION TITLE ── */
.section-title {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-bottom: -4px;
  padding: 0 4px;
}

/* ── FILTER BAR ── */
.filter-bar {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-bottom: 2px;
}
.filter-bar::-webkit-scrollbar { display: none; }

.chip {
  flex-shrink: 0;
  border: 1.5px solid var(--border);
  background: var(--white);
  color: var(--muted);
  border-radius: 30px;
  padding: 6px 14px;
  font-size: 0.75rem;
  font-weight: 500;
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.chip:active { transform: scale(0.95); }
.chip.active-all { background: var(--text); border-color: var(--text); color: var(--white); }

/* ── RECORDS LIST ── */
.records-section {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.record-item {
  background: var(--white);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: var(--shadow-sm);
  animation: fadeUp 0.3s ease both;
  border: 1px solid transparent;
  transition: border-color 0.15s;
}

.record-item:active { border-color: var(--border); }

.record-dot {
  width: 42px; height: 42px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
  flex-shrink: 0;
}

.record-info { flex: 1; min-width: 0; }

.record-desc {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.record-date {
  font-size: 0.7rem;
  color: var(--muted);
  margin-top: 2px;
  font-weight: 400;
}

.record-cat-tag {
  font-size: 0.62rem;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 20px;
  margin-top: 4px;
  display: inline-block;
}

.record-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  flex-shrink: 0;
}

.record-amount {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  font-weight: 700;
}

.btn-del {
  background: none; border: none;
  color: #CCC; font-size: 0.8rem;
  cursor: pointer; padding: 2px;
  transition: color 0.15s;
  line-height: 1;
}
.btn-del:active { color: #E05555; }

.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--muted);
}
.empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
.empty-state p { font-size: 0.85rem; line-height: 1.5; }

/* ── BOTTOM BAR ── */
.bottom-bar {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: var(--white);
  border-top: 1px solid var(--border);
  padding: 12px 24px calc(12px + env(safe-area-inset-bottom));
  display: flex;
  gap: 10px;
  z-index: 60;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.07);
}

.btn-export-bar {
  flex: 1;
  background: var(--bg);
  border: 1.5px solid var(--border);
  color: var(--muted);
  border-radius: 14px;
  padding: 14px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-export-bar:active { background: var(--border); }

.btn-clear-bar {
  width: 48px;
  flex-shrink: 0;
  background: #FEE;
  border: 1.5px solid #F5C2C2;
  color: #D94F4F;
  border-radius: 14px;
  padding: 14px 0;
  font-size: 1.1rem;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.btn-clear-bar:active { background: #F5C2C2; transform: scale(0.95); }

.btn-fab {
  flex: 2;
  background: var(--food);
  border: none;
  color: #fff;
  border-radius: 14px;
  padding: 14px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.02em;
  box-shadow: 0 4px 16px rgba(224,123,57,0.35);
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-fab:active { transform: scale(0.97); box-shadow: none; }

/* ── OVERLAY ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 100;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
  backdrop-filter: blur(2px);
}
.overlay.open { opacity: 1; pointer-events: all; }

/* ── BOTTOM SHEET (shared) ── */
.sheet {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%) translateY(100%);
  width: 100%; max-width: 430px;
  background: var(--white);
  border-radius: 28px 28px 0 0;
  z-index: 101;
  transition: transform 0.38s cubic-bezier(.32,1.2,.58,1);
  padding: 0 0 calc(28px + env(safe-area-inset-bottom));
  box-shadow: var(--shadow-lg);
}
.sheet.open { transform: translateX(-50%) translateY(0); }

.sheet-handle {
  width: 40px; height: 4px;
  background: var(--border);
  border-radius: 4px;
  margin: 14px auto 0;
}

.sheet-header {
  padding: 18px 24px 0;
  display: flex; align-items: center; justify-content: space-between;
}

.sheet-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.25rem;
  font-weight: 700;
}

.sheet-close {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--bg);
  border: none;
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted);
}

.sheet-body { padding: 20px 24px 0; display: flex; flex-direction: column; gap: 14px; }

.field { display: flex; flex-direction: column; gap: 6px; }

.field label {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
}

.field input, .field select {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 1rem;
  padding: 14px 16px;
  outline: none;
  width: 100%;
  transition: border-color 0.2s, background 0.2s;
  -webkit-appearance: none;
  appearance: none;
}
.field input:focus, .field select:focus {
  border-color: var(--food);
  background: var(--white);
}

/* ── CATEGORY GRID (add expense) ── */
.cat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  max-height: 220px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-right: 2px;
}
.cat-grid::-webkit-scrollbar { display: none; }

.cat-btn {
  border: 2px solid var(--border);
  background: var(--bg);
  border-radius: 14px;
  padding: 12px 10px;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--muted);
  text-align: center;
  transition: all 0.15s;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  word-break: break-word;
  line-height: 1.2;
}
.cat-btn span.ico { font-size: 1.4rem; }
.cat-btn:active { transform: scale(0.97); }
.cat-btn.sel { border-color: var(--food); background: var(--food-bg); color: var(--food); }

/* Add new cat button inside grid */
.cat-btn.add-cat-btn {
  border-style: dashed;
  border-color: var(--border);
  color: var(--muted);
}
.cat-btn.add-cat-btn:active { background: var(--bg2); }

.btn-confirm {
  background: var(--food);
  color: #fff;
  border: none;
  border-radius: 16px;
  padding: 16px;
  font-family: 'Outfit', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  width: 100%;
  box-shadow: 0 4px 16px rgba(224,123,57,0.3);
  transition: all 0.15s;
  margin-top: 4px;
}
.btn-confirm:active { transform: scale(0.98); box-shadow: none; }

/* ── MANAGE CATEGORIES SHEET ── */
.cat-manage-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 300px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.cat-manage-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg);
  border-radius: 14px;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
}

.cat-manage-icon {
  font-size: 1.4rem;
  width: 36px; text-align: center;
  flex-shrink: 0;
}

.cat-manage-name {
  flex: 1;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text);
}

.cat-manage-built { font-size: 0.65rem; color: var(--muted); }

.btn-del-cat {
  background: none; border: none;
  color: #CCC;
  font-size: 1rem;
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 8px;
  transition: all 0.15s;
  line-height: 1;
}
.btn-del-cat:active { color: #E05555; background: #FEE; }

/* new category form */
.new-cat-form {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 14px;
  background: var(--bg2);
  border-radius: 16px;
  border: 1.5px dashed var(--border);
}

.new-cat-form-title {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
}

.emoji-picker {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.emoji-opt {
  width: 38px; height: 38px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--white);
  font-size: 1.2rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.12s;
  flex-shrink: 0;
}
.emoji-opt.sel-emoji { border-color: var(--food); background: var(--food-bg); }
.emoji-opt:active { transform: scale(0.9); }

.color-picker {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.color-swatch {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2.5px solid transparent;
  cursor: pointer;
  transition: transform 0.12s, border-color 0.12s;
  flex-shrink: 0;
}
.color-swatch.sel-color { border-color: var(--text); transform: scale(1.15); }

.inp-sm {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 0.9rem;
  padding: 10px 14px;
  outline: none;
  width: 100%;
  transition: border-color 0.2s;
}
.inp-sm:focus { border-color: var(--food); }

.btn-add-cat-confirm {
  background: var(--text);
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 12px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-add-cat-confirm:active { opacity: 0.8; }

/* ── TOAST ── */
.toast {
  position: fixed;
  top: 80px; left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: var(--text);
  color: #fff;
  border-radius: 30px;
  padding: 11px 22px;
  font-size: 0.8rem;
  font-weight: 500;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s cubic-bezier(.34,1.4,.64,1);
  white-space: nowrap;
  box-shadow: var(--shadow-md);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--med); }
.toast.error   { background: #D94F4F; }

/* ── MONTH SELECT ── */
.month-select-wrap { position: relative; }

.month-select {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 30px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 0.75rem;
  font-weight: 500;
  padding: 6px 30px 6px 14px;
  outline: none;
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
  transition: border-color 0.15s;
}
.month-select:focus { border-color: var(--food); }

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.stat-card:nth-child(1) { animation-delay: 0.05s; }
.stat-card:nth-child(2) { animation-delay: 0.10s; }
.stat-card:nth-child(3) { animation-delay: 0.15s; }
</style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-row">
      <div>
        <h1>Mis <em>Gastos</em></h1>
        <div class="topbar-date" id="topbar-date"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="month-select-wrap">
          <select class="month-select" id="filter-month" onchange="renderAll()">
            <option value="all">Todo</option>
          </select>
          <span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:0.7rem">▾</span>
        </div>
        <button class="btn-icon" onclick="openCatManager()" title="Gestionar categorías" style="font-size:1rem">⚙️</button>
      </div>
    </div>
  </div>

  <!-- SCROLL AREA -->
  <div class="scroll-area">

    <!-- SUMMARY CARDS -->
    <div class="cards-row" id="summary-cards">
      <!-- rendered dynamically -->
      <div class="stat-card total">
        <div>
          <div class="stat-label">Total Gastado</div>
          <div class="stat-amount" id="sum-total">L 0.00</div>
        </div>
        <div class="total-right">
          <div class="stat-count" id="cnt-total">0 registros</div>
        </div>
      </div>
    </div>

    <!-- FILTER CHIPS -->
    <div>
      <div class="section-title" style="margin-bottom:10px">Categoría</div>
      <div class="filter-bar" id="chips"></div>
    </div>

    <!-- RECORDS -->
    <div>
      <div class="section-title" style="margin-bottom:10px">Historial</div>
      <div class="records-section" id="records"></div>
    </div>

  </div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <button class="btn-export-bar" onclick="exportExcel()">
      <span>📊</span> Excel
    </button>
    <button class="btn-clear-bar" onclick="clearHistory()" title="Limpiar historial">
      🗑
    </button>
    <button class="btn-fab" onclick="openSheet()">
      <span style="font-size:1.2rem">＋</span> Agregar Gasto
    </button>
  </div>

</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeAll()"></div>

<!-- SHEET: ADD EXPENSE -->
<div class="sheet" id="sheet-add">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title">Nuevo Gasto</div>
    <button class="sheet-close" onclick="closeAll()">✕</button>
  </div>
  <div class="sheet-body">
    <div class="field">
      <label>Categoría</label>
      <div class="cat-grid" id="cat-grid-add"></div>
    </div>
    <div class="field">
      <label>Descripción <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted);font-size:0.65rem">(opcional)</span></label>
      <input type="text" id="inp-desc" placeholder="ej. La Colonia, Farmacia Kielsa…" autocomplete="off">
    </div>
    <div class="field">
      <label>Monto (Lempiras)</label>
      <input type="number" id="inp-amount" placeholder="0.00" min="0" step="0.01" inputmode="decimal">
    </div>
    <div class="field">
      <label>Fecha</label>
      <input type="date" id="inp-date">
    </div>
    <button class="btn-confirm" onclick="addRecord()">Guardar Gasto</button>
  </div>
</div>

<!-- SHEET: MANAGE CATEGORIES -->
<div class="sheet" id="sheet-cats">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title">Categorías</div>
    <button class="sheet-close" onclick="closeAll()">✕</button>
  </div>
  <div class="sheet-body" style="overflow-y:auto;max-height:85vh;">

    <div class="cat-manage-list" id="cat-manage-list"></div>

    <!-- NEW CATEGORY FORM -->
    <div class="new-cat-form">
      <div class="new-cat-form-title">✨ Nueva categoría</div>

      <div class="field" style="gap:4px">
        <label>Nombre</label>
        <input class="inp-sm" type="text" id="new-cat-name" placeholder="ej. Transporte">
      </div>

      <div>
        <label style="font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);display:block;margin-bottom:6px">Ícono</label>
        <div class="emoji-picker" id="emoji-picker"></div>
      </div>

      <div>
        <label style="font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);display:block;margin-bottom:6px">Color</label>
        <div class="color-picker" id="color-picker"></div>
      </div>

      <button class="btn-add-cat-confirm" onclick="addCategory()">Agregar Categoría</button>
    </div>

  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ──────────────────────────────────────────────────────────────
// CONSTANTS & STATE
// ──────────────────────────────────────────────────────────────
const DB_KEY      = 'gastos_ls_v1';
const CATS_KEY    = 'gastos_cats_v1';
const MONTHS      = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const MONTHS_FULL = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

const EMOJI_OPTIONS = ['🛒','🍽','🏥','🚌','🚗','🎓','🏠','👗','💊','🎬','🐾','⚡','📱','💡','💇','🧴','🎮','✈️','🏋️','📚','☕','🍕','🎁','🧹','💰','🛠️','🩺','🍼'];

const COLOR_OPTIONS = [
  { name:'naranja',  accent:'#E07B39', bg:'#FEF0E6', soft:'#FBDEC7' },
  { name:'verde',    accent:'#3A8C74', bg:'#E6F4EF', soft:'#C0E2D9' },
  { name:'azul',     accent:'#2E5FA3', bg:'#EBF1FB', soft:'#C5D7F5' },
  { name:'morado',   accent:'#7C4DBC', bg:'#F3EDFC', soft:'#D8C4F5' },
  { name:'rojo',     accent:'#D94F4F', bg:'#FEEBEB', soft:'#F5C2C2' },
  { name:'rosa',     accent:'#D4579A', bg:'#FEE9F4', soft:'#F5C0DE' },
  { name:'amarillo', accent:'#C49A0A', bg:'#FDF8E3', soft:'#F2E4A0' },
  { name:'gris',     accent:'#5E6E82', bg:'#EEF1F5', soft:'#C8D2DF' },
];

// Built-in categories (id-based, cannot be deleted)
const BUILTIN_CATS = [
  { id: 'food',    name: 'Alimentación', emoji: '🍽', color: COLOR_OPTIONS[0], builtin: true },
  { id: 'medical', name: 'Seguro Médico', emoji: '🏥', color: COLOR_OPTIONS[1], builtin: true },
];

let activeCat    = 'all';
let selectedCat  = 'food';    // id of cat chosen in add form
let selectedEmoji = EMOJI_OPTIONS[0];
let selectedColor = COLOR_OPTIONS[2];
let activeSheet  = null;      // 'add' | 'cats' | null

// ──────────────────────────────────────────────────────────────
// STORAGE
// ──────────────────────────────────────────────────────────────
function loadData()   { try { return JSON.parse(localStorage.getItem(DB_KEY))   || []; } catch { return []; } }
function saveData(r)  { localStorage.setItem(DB_KEY,   JSON.stringify(r)); }
function loadCats()   { try { return JSON.parse(localStorage.getItem(CATS_KEY)) || []; } catch { return []; } }
function saveCats(c)  { localStorage.setItem(CATS_KEY, JSON.stringify(c)); }

function allCats() {
  return [...BUILTIN_CATS, ...loadCats()];
}

function getCat(id) {
  return allCats().find(c => c.id === id) || { id, name: id, emoji: '📦', color: COLOR_OPTIONS[7] };
}

// ──────────────────────────────────────────────────────────────
// HELPERS
// ──────────────────────────────────────────────────────────────
function fmt(n) {
  return 'L ' + Number(n).toLocaleString('es-HN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtShort(n) {
  if (n >= 10000) return 'L ' + (n / 1000).toFixed(1) + 'k';
  return fmt(n);
}
function fmtDate(s) {
  const [y, m, d] = s.split('-');
  return `${d} ${MONTHS[+m - 1]} ${y}`;
}
function getYM(fecha) { return fecha.slice(0, 7); }

function setDefaultDate() {
  document.getElementById('inp-date').value = new Date().toISOString().split('T')[0];
}
function updateTopbarDate() {
  const d = new Date();
  document.getElementById('topbar-date').textContent =
    `${d.getDate()} de ${MONTHS_FULL[d.getMonth()]} ${d.getFullYear()}`;
}
function toast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  clearTimeout(t._to);
  t._to = setTimeout(() => t.className = 'toast', 2600);
}

// ──────────────────────────────────────────────────────────────
// SHEETS
// ──────────────────────────────────────────────────────────────
function openSheet() {
  activeSheet = 'add';
  buildCatGrid();
  document.getElementById('sheet-add').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('inp-desc').focus(), 400);
}

function openCatManager() {
  activeSheet = 'cats';
  buildEmojiPicker();
  buildColorPicker();
  buildCatManageList();
  document.getElementById('sheet-cats').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeAll() {
  document.getElementById('sheet-add').classList.remove('open');
  document.getElementById('sheet-cats').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
  activeSheet = null;
}

// ──────────────────────────────────────────────────────────────
// BUILD CAT GRID (add expense form)
// ──────────────────────────────────────────────────────────────
function buildCatGrid() {
  const grid = document.getElementById('cat-grid-add');
  const cats = allCats();
  grid.innerHTML = '';

  // make sure selectedCat still exists
  if (!cats.find(c => c.id === selectedCat)) selectedCat = cats[0]?.id || 'food';

  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat.id === selectedCat ? ' sel' : '');
    if (cat.id === selectedCat) {
      btn.style.borderColor = cat.color.accent;
      btn.style.background  = cat.color.bg;
      btn.style.color       = cat.color.accent;
    }
    btn.innerHTML = `<span class="ico">${cat.emoji}</span>${cat.name}`;
    btn.onclick = () => {
      selectedCat = cat.id;
      buildCatGrid();
    };
    grid.appendChild(btn);
  });
}

// ──────────────────────────────────────────────────────────────
// BUILD EMOJI PICKER
// ──────────────────────────────────────────────────────────────
function buildEmojiPicker() {
  const wrap = document.getElementById('emoji-picker');
  wrap.innerHTML = '';
  EMOJI_OPTIONS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emoji-opt' + (e === selectedEmoji ? ' sel-emoji' : '');
    btn.textContent = e;
    btn.onclick = () => { selectedEmoji = e; buildEmojiPicker(); };
    wrap.appendChild(btn);
  });
}

// ──────────────────────────────────────────────────────────────
// BUILD COLOR PICKER
// ──────────────────────────────────────────────────────────────
function buildColorPicker() {
  const wrap = document.getElementById('color-picker');
  wrap.innerHTML = '';
  COLOR_OPTIONS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'color-swatch' + (c.name === selectedColor.name ? ' sel-color' : '');
    btn.style.background = c.accent;
    btn.title = c.name;
    btn.onclick = () => { selectedColor = c; buildColorPicker(); };
    wrap.appendChild(btn);
  });
}

// ──────────────────────────────────────────────────────────────
// BUILD MANAGE CATEGORIES LIST
// ──────────────────────────────────────────────────────────────
function buildCatManageList() {
  const list = document.getElementById('cat-manage-list');
  list.innerHTML = '';
  allCats().forEach(cat => {
    const item = document.createElement('div');
    item.className = 'cat-manage-item';
    item.style.borderColor = cat.color.accent + '55';
    item.style.background = cat.color.bg;
    item.innerHTML = `
      <div class="cat-manage-icon">${cat.emoji}</div>
      <div class="cat-manage-name" style="color:${cat.color.accent}">${cat.name}
        ${cat.builtin ? '<div class="cat-manage-built">predeterminada</div>' : ''}
      </div>
      ${!cat.builtin ? `<button class="btn-del-cat" onclick="deleteCategory('${cat.id}')" title="Eliminar">🗑</button>` : ''}
    `;
    list.appendChild(item);
  });
}

// ──────────────────────────────────────────────────────────────
// ADD CATEGORY
// ──────────────────────────────────────────────────────────────
function addCategory() {
  const nameEl = document.getElementById('new-cat-name');
  const name = nameEl.value.trim();
  if (!name) { toast('Escribe un nombre', 'error'); return; }

  const cats = loadCats();
  const id = 'custom_' + Date.now();
  cats.push({ id, name, emoji: selectedEmoji, color: selectedColor, builtin: false });
  saveCats(cats);
  nameEl.value = '';
  selectedEmoji = EMOJI_OPTIONS[0];
  selectedColor = COLOR_OPTIONS[2];
  buildCatManageList();
  buildEmojiPicker();
  buildColorPicker();
  renderAll();
  toast('✓ Categoría creada', 'success');
}

// ──────────────────────────────────────────────────────────────
// DELETE CATEGORY
// ──────────────────────────────────────────────────────────────
function deleteCategory(id) {
  const records = loadData();
  const count = records.filter(r => r.categoria === id).length;
  const msg = count > 0
    ? `Esta categoría tiene ${count} registro${count > 1 ? 's' : ''}. ¿Eliminar de todas formas?`
    : '¿Eliminar esta categoría?';
  if (!confirm(msg)) return;
  const cats = loadCats().filter(c => c.id !== id);
  saveCats(cats);
  if (selectedCat === id) selectedCat = 'food';
  if (activeCat === id) activeCat = 'all';
  buildCatManageList();
  renderAll();
  toast('Categoría eliminada');
}

// ──────────────────────────────────────────────────────────────
// CHIPS
// ──────────────────────────────────────────────────────────────
function renderChips() {
  const wrap = document.getElementById('chips');
  wrap.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'chip' + (activeCat === 'all' ? ' active-all' : '');
  allBtn.textContent = 'Todos';
  allBtn.onclick = () => { activeCat = 'all'; renderAll(); };
  wrap.appendChild(allBtn);

  allCats().forEach(cat => {
    const btn = document.createElement('button');
    const isActive = activeCat === cat.id;
    btn.className = 'chip';
    if (isActive) {
      btn.style.background   = cat.color.soft;
      btn.style.borderColor  = cat.color.accent;
      btn.style.color        = cat.color.accent;
    }
    btn.textContent = `${cat.emoji} ${cat.name}`;
    btn.onclick = () => { activeCat = cat.id; renderAll(); };
    wrap.appendChild(btn);
  });
}

// ──────────────────────────────────────────────────────────────
// MONTH FILTER
// ──────────────────────────────────────────────────────────────
function populateMonthFilter() {
  const records = loadData();
  const months = [...new Set(records.map(r => getYM(r.fecha)))].sort().reverse();
  const sel = document.getElementById('filter-month');
  const current = sel.value;
  while (sel.options.length > 1) sel.remove(1);
  months.forEach(ym => {
    const [y, m] = ym.split('-');
    sel.appendChild(new Option(`${MONTHS[+m - 1]} ${y}`, ym));
  });
  if ([...sel.options].some(o => o.value === current)) sel.value = current;
}

function getMonthFilter() { return document.getElementById('filter-month').value; }

// ──────────────────────────────────────────────────────────────
// ADD RECORD
// ──────────────────────────────────────────────────────────────
function addRecord() {
  const date   = document.getElementById('inp-date').value;
  const desc   = document.getElementById('inp-desc').value.trim();
  const amount = parseFloat(document.getElementById('inp-amount').value);

  if (!date)               { toast('Selecciona una fecha', 'error'); return; }
  if (!amount || amount <= 0) { toast('Ingresa un monto válido', 'error'); return; }

  const records = loadData();
  const newId = records.length ? Math.max(...records.map(r => r.id)) + 1 : 1;
  records.push({ id: newId, fecha: date, categoria: selectedCat, descripcion: desc, monto: amount });
  saveData(records);

  document.getElementById('inp-desc').value   = '';
  document.getElementById('inp-amount').value = '';

  closeAll();
  populateMonthFilter();
  renderAll();
  toast('✓ Gasto guardado', 'success');
}

// ──────────────────────────────────────────────────────────────
// DELETE RECORD
// ──────────────────────────────────────────────────────────────
function deleteRecord(id) {
  if (!confirm('¿Eliminar este registro?')) return;
  const records = loadData().filter(r => r.id !== id);
  saveData(records);
  populateMonthFilter();
  renderAll();
  toast('Registro eliminado');
}

// ──────────────────────────────────────────────────────────────
// FILTERS
// ──────────────────────────────────────────────────────────────
function applyFilters(records) {
  const mf = getMonthFilter();
  const cf = activeCat;
  return records.filter(r => {
    const catMatch = cf === 'all' || r.categoria === cf;
    const monMatch = mf === 'all' || getYM(r.fecha) === mf;
    return catMatch && monMatch;
  }).sort((a, b) => b.fecha.localeCompare(a.fecha) || b.id - a.id);
}

// ──────────────────────────────────────────────────────────────
// RENDER ALL
// ──────────────────────────────────────────────────────────────
function renderAll() {
  renderSummaryCards();
  renderChips();
  renderRecords();
}

function renderSummaryCards() {
  const mf = getMonthFilter();
  const all = loadData().filter(r => mf === 'all' || getYM(r.fecha) === mf);
  const cats = allCats();
  const container = document.getElementById('summary-cards');

  // rebuild grid except last child (total card)
  // first, remove old dyn cards
  container.querySelectorAll('.dyn-card').forEach(el => el.remove());

  let grandTotal = 0;
  cats.forEach((cat, i) => {
    const subset = all.filter(r => r.categoria === cat.id);
    const sum = subset.reduce((s, r) => s + r.monto, 0);
    grandTotal += sum;

    const card = document.createElement('div');
    card.className = 'dyn-card';
    card.style.background = cat.color.bg;
    card.style.animationDelay = `${i * 0.05}s`;
    card.innerHTML = `
      <div class="stat-icon">${cat.emoji}</div>
      <div class="stat-label" style="color:${cat.color.accent}">${cat.name}</div>
      <div class="stat-amount" style="color:${cat.color.accent};font-family:'Playfair Display',serif;font-size:1.45rem;font-weight:700;letter-spacing:-0.5px;line-height:1">${fmtShort(sum)}</div>
      <div class="stat-count">${subset.length} registro${subset.length !== 1 ? 's' : ''}</div>
    `;
    // insert before total card
    container.insertBefore(card, container.querySelector('.stat-card.total'));
  });

  document.getElementById('sum-total').textContent = fmt(grandTotal);
  document.getElementById('cnt-total').textContent = `${all.length} en total`;

  // fix grid layout: if odd number of dyn cards, last one spans full width
  const dynCards = container.querySelectorAll('.dyn-card');
  dynCards.forEach(c => c.style.gridColumn = '');
  if (dynCards.length % 2 !== 0) {
    dynCards[dynCards.length - 1].style.gridColumn = 'span 2';
  }
}

function renderRecords() {
  const filtered  = applyFilters(loadData());
  const container = document.getElementById('records');
  container.innerHTML = '';

  if (!filtered.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <p>Sin registros aún.<br>Toca <strong>+ Agregar Gasto</strong> para comenzar.</p>
      </div>`;
    return;
  }

  filtered.forEach((r, i) => {
    const cat = getCat(r.categoria);
    const div = document.createElement('div');
    div.className = 'record-item';
    div.style.animationDelay = `${i * 0.04}s`;
    div.innerHTML = `
      <div class="record-dot" style="background:${cat.color.bg}">${cat.emoji}</div>
      <div class="record-info">
        <div class="record-desc">${r.descripcion || '—'}</div>
        <div class="record-date">${fmtDate(r.fecha)}</div>
        <span class="record-cat-tag" style="background:${cat.color.soft};color:${cat.color.accent}">${cat.name}</span>
      </div>
      <div class="record-right">
        <div class="record-amount" style="color:${cat.color.accent}">${fmt(r.monto)}</div>
        <button class="btn-del" onclick="deleteRecord(${r.id})" title="Eliminar">✕</button>
      </div>
    `;
    container.appendChild(div);
  });
}

// ──────────────────────────────────────────────────────────────
// CLEAR HISTORY
// ──────────────────────────────────────────────────────────────
function clearHistory() {
  const mf = getMonthFilter();
  const all = loadData();
  const toDelete = all.filter(r => mf === 'all' || getYM(r.fecha) === mf);
  if (!toDelete.length) { toast('No hay registros para limpiar', 'error'); return; }

  const label = mf === 'all'
    ? `todos los ${toDelete.length} registros`
    : `los ${toDelete.length} registros de ${document.getElementById('filter-month').options[document.getElementById('filter-month').selectedIndex].text}`;

  if (!confirm(`¿Eliminar ${label}? Esta acción no se puede deshacer.`)) return;

  const remaining = all.filter(r => !(mf === 'all' || getYM(r.fecha) === mf));
  saveData(remaining);
  populateMonthFilter();
  renderAll();
  toast('🗑 Historial limpiado', 'success');
}

// ──────────────────────────────────────────────────────────────
// EXPORT
// ──────────────────────────────────────────────────────────────
function exportExcel() {
  const filtered = applyFilters(loadData());
  if (!filtered.length) { toast('Sin datos para exportar', 'error'); return; }

  const rows = filtered.map(r => {
    const cat = getCat(r.categoria);
    return {
      Fecha: fmtDate(r.fecha),
      Categoría: cat.name,
      Descripción: r.descripcion || '',
      'Monto (L)': Number(r.monto)
    };
  });
  const total = rows.reduce((s, r) => s + r['Monto (L)'], 0);
  rows.push({ Fecha: '', Categoría: '', Descripción: 'TOTAL', 'Monto (L)': total });

  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{ wch: 16 }, { wch: 22 }, { wch: 32 }, { wch: 14 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Gastos');
  XLSX.writeFile(wb, `gastos_${new Date().toISOString().split('T')[0]}.xlsx`);
  toast('📊 Excel descargado', 'success');
}

// ──────────────────────────────────────────────────────────────
// KEYBOARD & SWIPE
// ──────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && activeSheet === 'add') addRecord();
  if (e.key === 'Escape') closeAll();
});

(function () {
  let startY = 0;
  ['sheet-add','sheet-cats'].forEach(id => {
    const sheet = document.getElementById(id);
    sheet.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
    sheet.addEventListener('touchend',   e => { if (e.changedTouches[0].clientY - startY > 80) closeAll(); }, { passive: true });
  });
})();

// ──────────────────────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────────────────────
setDefaultDate();
updateTopbarDate();
populateMonthFilter();
renderAll();
</script>
</body>
</html>
