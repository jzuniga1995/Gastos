<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F7F4EF">
<title>MisGastos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap');

:root {
  --bg:        #F7F4EF;
  --bg2:       #EFEAE2;
  --white:     #FFFFFF;
  --border:    #E2DBD0;
  --text:      #1A1612;
  --muted:     #9B8F82;
  --food:      #E07B39;
  --food-bg:   #FEF0E6;
  --food-soft: #FBDEC7;
  --med:       #3A8C74;
  --med-bg:    #E6F4EF;
  --med-soft:  #C0E2D9;
  --total:     #2E5FA3;
  --total-bg:  #EBF1FB;
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.10);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.14);
  --radius:    20px;
  --radius-sm: 12px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%;
  overflow-x: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 16px;
}

/* ── SAFE AREA (notch) ── */
body { padding-bottom: env(safe-area-inset-bottom); }

/* ── APP SHELL ── */
.app {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* ── TOP BAR ── */
.topbar {
  background: var(--white);
  padding: 54px 24px 20px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 50;
}

.topbar-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.topbar h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.5px;
}

.topbar h1 em {
  font-style: italic;
  color: var(--food);
}

.topbar-date {
  font-size: 0.72rem;
  color: var(--muted);
  font-weight: 400;
  margin-top: 2px;
}

.btn-icon {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--bg);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 1.1rem;
  transition: background 0.15s;
}
.btn-icon:active { background: var(--border); }

/* ── SCROLL AREA ── */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 20px 16px 120px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* ── CARDS ROW ── */
.cards-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.stat-card {
  border-radius: var(--radius);
  padding: 18px 16px;
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.4s ease both;
}

.stat-card.food  { background: var(--food-bg); }
.stat-card.med   { background: var(--med-bg); }
.stat-card.total {
  grid-column: span 2;
  background: var(--total-bg);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 22px;
}

.stat-icon {
  font-size: 1.5rem;
  margin-bottom: 8px;
}

.stat-label {
  font-size: 0.67rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
  margin-bottom: 4px;
}

.stat-card.food  .stat-label { color: var(--food); }
.stat-card.med   .stat-label { color: var(--med); }
.stat-card.total .stat-label { color: var(--total); }

.stat-amount {
  font-family: 'Playfair Display', serif;
  font-size: 1.45rem;
  font-weight: 700;
  letter-spacing: -0.5px;
  line-height: 1;
}

.stat-card.food  .stat-amount { color: var(--food); }
.stat-card.med   .stat-amount { color: var(--med); }
.stat-card.total .stat-amount { color: var(--total); font-size: 1.9rem; }

.stat-count {
  font-size: 0.67rem;
  color: var(--muted);
  margin-top: 5px;
  font-weight: 400;
}

.total-right { text-align: right; }

/* ── SECTION TITLE ── */
.section-title {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-bottom: -4px;
  padding: 0 4px;
}

/* ── FILTER BAR ── */
.filter-bar {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-bottom: 2px;
}
.filter-bar::-webkit-scrollbar { display: none; }

.chip {
  flex-shrink: 0;
  border: 1.5px solid var(--border);
  background: var(--white);
  color: var(--muted);
  border-radius: 30px;
  padding: 6px 14px;
  font-size: 0.75rem;
  font-weight: 500;
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.chip:active { transform: scale(0.95); }
.chip.active-food  { background: var(--food-soft); border-color: var(--food); color: var(--food); }
.chip.active-med   { background: var(--med-soft); border-color: var(--med); color: var(--med); }
.chip.active-all   { background: var(--text); border-color: var(--text); color: var(--white); }

/* ── RECORDS LIST ── */
.records-section {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.record-item {
  background: var(--white);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: var(--shadow-sm);
  animation: fadeUp 0.3s ease both;
  border: 1px solid transparent;
  transition: border-color 0.15s;
}

.record-item:active { border-color: var(--border); }

.record-dot {
  width: 42px; height: 42px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
  flex-shrink: 0;
}
.record-dot.food { background: var(--food-bg); }
.record-dot.med  { background: var(--med-bg); }

.record-info { flex: 1; min-width: 0; }

.record-desc {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.record-date {
  font-size: 0.7rem;
  color: var(--muted);
  margin-top: 2px;
  font-weight: 400;
}

.record-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  flex-shrink: 0;
}

.record-amount {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  font-weight: 700;
}
.record-amount.food { color: var(--food); }
.record-amount.med  { color: var(--med); }

.btn-del {
  background: none; border: none;
  color: #CCC; font-size: 0.8rem;
  cursor: pointer; padding: 2px;
  transition: color 0.15s;
  line-height: 1;
}
.btn-del:active { color: #E05555; }

.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--muted);
}
.empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
.empty-state p { font-size: 0.85rem; line-height: 1.5; }

/* ── BOTTOM NAV / FAB ── */
.bottom-bar {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: var(--white);
  border-top: 1px solid var(--border);
  padding: 12px 24px calc(12px + env(safe-area-inset-bottom));
  display: flex;
  gap: 10px;
  z-index: 60;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.07);
}

.btn-export-bar {
  flex: 1;
  background: var(--bg);
  border: 1.5px solid var(--border);
  color: var(--muted);
  border-radius: 14px;
  padding: 14px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-export-bar:active { background: var(--border); }

.btn-fab {
  flex: 2;
  background: var(--food);
  border: none;
  color: #fff;
  border-radius: 14px;
  padding: 14px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.02em;
  box-shadow: 0 4px 16px rgba(224,123,57,0.35);
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-fab:active { transform: scale(0.97); box-shadow: none; }

/* ── MODAL SHEET ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 100;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
  backdrop-filter: blur(2px);
}
.overlay.open { opacity: 1; pointer-events: all; }

.sheet {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%) translateY(100%);
  width: 100%; max-width: 430px;
  background: var(--white);
  border-radius: 28px 28px 0 0;
  z-index: 101;
  transition: transform 0.38s cubic-bezier(.32,1.2,.58,1);
  padding: 0 0 calc(28px + env(safe-area-inset-bottom));
  box-shadow: var(--shadow-lg);
}
.sheet.open { transform: translateX(-50%) translateY(0); }

.sheet-handle {
  width: 40px; height: 4px;
  background: var(--border);
  border-radius: 4px;
  margin: 14px auto 0;
}

.sheet-header {
  padding: 18px 24px 0;
  display: flex; align-items: center; justify-content: space-between;
}

.sheet-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.25rem;
  font-weight: 700;
}

.sheet-close {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--bg);
  border: none;
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted);
}

.sheet-body { padding: 20px 24px 0; display: flex; flex-direction: column; gap: 14px; }

.field { display: flex; flex-direction: column; gap: 6px; }

.field label {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
}

.field input, .field select {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 1rem;
  padding: 14px 16px;
  outline: none;
  width: 100%;
  transition: border-color 0.2s, background 0.2s;
  -webkit-appearance: none;
  appearance: none;
}
.field input:focus, .field select:focus {
  border-color: var(--food);
  background: var(--white);
}

/* Category toggle */
.cat-toggle {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.cat-btn {
  border: 2px solid var(--border);
  background: var(--bg);
  border-radius: 14px;
  padding: 14px 12px;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--muted);
  text-align: center;
  transition: all 0.15s;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.cat-btn span.ico { font-size: 1.5rem; }
.cat-btn:active { transform: scale(0.97); }
.cat-btn.sel-food { border-color: var(--food); background: var(--food-bg); color: var(--food); }
.cat-btn.sel-med  { border-color: var(--med);  background: var(--med-bg);  color: var(--med); }

.btn-confirm {
  background: var(--food);
  color: #fff;
  border: none;
  border-radius: 16px;
  padding: 16px;
  font-family: 'Outfit', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  width: 100%;
  box-shadow: 0 4px 16px rgba(224,123,57,0.3);
  transition: all 0.15s;
  margin-top: 4px;
}
.btn-confirm:active { transform: scale(0.98); box-shadow: none; }

/* ── TOAST ── */
.toast {
  position: fixed;
  top: 80px; left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: var(--text);
  color: #fff;
  border-radius: 30px;
  padding: 11px 22px;
  font-size: 0.8rem;
  font-weight: 500;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s cubic-bezier(.34,1.4,.64,1);
  white-space: nowrap;
  box-shadow: var(--shadow-md);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--med); }
.toast.error   { background: #D94F4F; }

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.stat-card:nth-child(1) { animation-delay: 0.05s; }
.stat-card:nth-child(2) { animation-delay: 0.10s; }
.stat-card:nth-child(3) { animation-delay: 0.15s; }

/* Month select styled */
.month-select-wrap {
  position: relative;
}
.month-select-wrap::after {
  content: '▾';
  position: absolute;
  right: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  pointer-events: none;
  font-size: 0.75rem;
}
.month-select {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 30px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 0.75rem;
  font-weight: 500;
  padding: 6px 30px 6px 14px;
  outline: none;
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
  transition: border-color 0.15s;
}
.month-select:focus { border-color: var(--food); }
</style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-row">
      <div>
        <h1>Mis <em>Gastos</em></h1>
        <div class="topbar-date" id="topbar-date"></div>
      </div>
      <div class="month-select-wrap">
        <select class="month-select" id="filter-month" onchange="renderAll()">
          <option value="all">Todo</option>
        </select>
        <span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:0.7rem">▾</span>
      </div>
    </div>
  </div>

  <!-- SCROLL AREA -->
  <div class="scroll-area">

    <!-- SUMMARY CARDS -->
    <div class="cards-row">
      <div class="stat-card food">
        <div class="stat-icon">🍽</div>
        <div class="stat-label">Alimentación</div>
        <div class="stat-amount" id="sum-food">L 0</div>
        <div class="stat-count" id="cnt-food">0 registros</div>
      </div>
      <div class="stat-card med">
        <div class="stat-icon">🏥</div>
        <div class="stat-label">Seguro Médico</div>
        <div class="stat-amount" id="sum-med">L 0</div>
        <div class="stat-count" id="cnt-med">0 registros</div>
      </div>
      <div class="stat-card total">
        <div>
          <div class="stat-label">Total Gastado</div>
          <div class="stat-amount" id="sum-total">L 0.00</div>
        </div>
        <div class="total-right">
          <div class="stat-count" id="cnt-total">0 registros</div>
        </div>
      </div>
    </div>

    <!-- FILTER CHIPS -->
    <div>
      <div class="section-title" style="margin-bottom:10px">Categoría</div>
      <div class="filter-bar" id="chips">
        <button class="chip active-all" data-cat="all" onclick="setChip(this,'all')">Todos</button>
        <button class="chip" data-cat="food" onclick="setChip(this,'food')">🍽 Alimentación</button>
        <button class="chip" data-cat="medical" onclick="setChip(this,'med')">🏥 Seguro Médico</button>
      </div>
    </div>

    <!-- RECORDS -->
    <div>
      <div class="section-title" style="margin-bottom:10px">Historial</div>
      <div class="records-section" id="records"></div>
    </div>

  </div><!-- end scroll-area -->

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <button class="btn-export-bar" onclick="exportExcel()">
      <span>📊</span> Excel
    </button>
    <button class="btn-fab" onclick="openSheet()">
      <span style="font-size:1.2rem">＋</span> Agregar Gasto
    </button>
  </div>

</div><!-- end app -->

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeSheet()"></div>

<!-- BOTTOM SHEET (ADD FORM) -->
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title">Nuevo Gasto</div>
    <button class="sheet-close" onclick="closeSheet()">✕</button>
  </div>
  <div class="sheet-body">

    <div class="field">
      <label>Categoría</label>
      <div class="cat-toggle">
        <button class="cat-btn sel-food" id="cat-food" onclick="selectCat('food')">
          <span class="ico">🍽</span>Alimentación
        </button>
        <button class="cat-btn" id="cat-med" onclick="selectCat('medical')">
          <span class="ico">🏥</span>Seguro Médico
        </button>
      </div>
    </div>

    <div class="field">
      <label>Descripción</label>
      <input type="text" id="inp-desc" placeholder="ej. Supermercado La Colonia…" autocomplete="off">
    </div>

    <div class="field">
      <label>Monto (Lempiras)</label>
      <input type="number" id="inp-amount" placeholder="0.00" min="0" step="0.01" inputmode="decimal">
    </div>

    <div class="field">
      <label>Fecha</label>
      <input type="date" id="inp-date">
    </div>

    <button class="btn-confirm" onclick="addRecord()">Guardar Gasto</button>

  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────────────────
let db;
let activeCat  = 'all';
let selectedCat = 'food';
const DB_KEY    = 'gastos_db_v2';
const MONTHS    = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

// ── INIT ──────────────────────────────────────────────────────
async function initDB() {
  const SQL = await initSqlJs({
    locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}`
  });

  const saved = localStorage.getItem(DB_KEY);
  if (saved) {
    try {
      const arr = Uint8Array.from(atob(saved), c => c.charCodeAt(0));
      db = new SQL.Database(arr);
    } catch { db = new SQL.Database(); }
  } else {
    db = new SQL.Database();
  }

  db.run(`CREATE TABLE IF NOT EXISTS gastos (
    id INTEGER PRIMARY KEY AUTOINCREMENT,
    fecha TEXT NOT NULL,
    categoria TEXT NOT NULL,
    descripcion TEXT,
    monto REAL NOT NULL
  )`);

  saveDB();
  setDefaultDate();
  updateTopbarDate();
  populateMonthFilter();
  renderAll();
}

function saveDB() {
  const data = db.export();
  localStorage.setItem(DB_KEY, btoa(String.fromCharCode(...data)));
}

// ── HELPERS ──────────────────────────────────────────────────
function fmt(n) {
  return 'L ' + Number(n).toLocaleString('es-HN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtShort(n) {
  if (n >= 10000) return 'L ' + (n/1000).toFixed(1) + 'k';
  return fmt(n);
}

function fmtDate(s) {
  const [y,m,d] = s.split('-');
  return `${d} ${MONTHS[+m-1]} ${y}`;
}

function setDefaultDate() {
  document.getElementById('inp-date').value = new Date().toISOString().split('T')[0];
}

function updateTopbarDate() {
  const d = new Date();
  document.getElementById('topbar-date').textContent =
    `${d.getDate()} de ${['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][d.getMonth()]} ${d.getFullYear()}`;
}

function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  clearTimeout(t._to);
  t._to = setTimeout(() => t.className = 'toast', 2600);
}

// ── SHEET ────────────────────────────────────────────────────
function openSheet() {
  document.getElementById('sheet').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('inp-desc').focus(), 400);
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ── CATEGORY TOGGLE ──────────────────────────────────────────
function selectCat(cat) {
  selectedCat = cat;
  document.getElementById('cat-food').className = 'cat-btn' + (cat === 'food' ? ' sel-food' : '');
  document.getElementById('cat-med').className  = 'cat-btn' + (cat === 'medical' ? ' sel-med' : '');
}

// ── CHIPS ────────────────────────────────────────────────────
function setChip(el, cat) {
  activeCat = cat;
  document.querySelectorAll('.chip').forEach(c => {
    c.className = 'chip';
    if (c === el) {
      if (cat === 'all') c.classList.add('active-all');
      else if (cat === 'food') c.classList.add('active-food');
      else c.classList.add('active-med');
    }
  });
  renderAll();
}

// ── MONTH FILTER ─────────────────────────────────────────────
function populateMonthFilter() {
  const rows = db.exec("SELECT DISTINCT substr(fecha,1,7) as ym FROM gastos ORDER BY ym DESC");
  const sel = document.getElementById('filter-month');
  while (sel.options.length > 1) sel.remove(1);
  if (rows.length && rows[0].values.length) {
    rows[0].values.forEach(([ym]) => {
      const [y,m] = ym.split('-');
      sel.appendChild(new Option(`${MONTHS[+m-1]} ${y}`, ym));
    });
  }
}

// ── ADD RECORD ───────────────────────────────────────────────
function addRecord() {
  const date   = document.getElementById('inp-date').value;
  const desc   = document.getElementById('inp-desc').value.trim();
  const amount = parseFloat(document.getElementById('inp-amount').value);

  if (!date)           { toast('Selecciona una fecha', 'error'); return; }
  if (!desc)           { toast('Escribe una descripción', 'error'); return; }
  if (!amount || amount <= 0) { toast('Ingresa un monto válido', 'error'); return; }

  db.run("INSERT INTO gastos (fecha, categoria, descripcion, monto) VALUES (?,?,?,?)",
    [date, selectedCat, desc, amount]);
  saveDB();

  document.getElementById('inp-desc').value   = '';
  document.getElementById('inp-amount').value = '';

  closeSheet();
  populateMonthFilter();
  renderAll();
  toast('✓ Gasto guardado', 'success');
}

// ── DELETE ───────────────────────────────────────────────────
function deleteRecord(id) {
  if (!confirm('¿Eliminar este registro?')) return;
  db.run("DELETE FROM gastos WHERE id=?", [id]);
  saveDB();
  populateMonthFilter();
  renderAll();
  toast('Registro eliminado');
}

// ── RENDER ───────────────────────────────────────────────────
function renderAll() {
  renderSummary();
  renderRecords();
}

function getMonthFilter() {
  return document.getElementById('filter-month').value;
}

function renderSummary() {
  const mf = getMonthFilter();
  let where = '1=1';
  const params = [];
  if (mf !== 'all') { where += " AND substr(fecha,1,7)=?"; params.push(mf); }

  const res = db.exec(`
    SELECT
      SUM(CASE WHEN categoria='food'    THEN monto ELSE 0 END),
      SUM(CASE WHEN categoria='medical' THEN monto ELSE 0 END),
      COUNT(CASE WHEN categoria='food'    THEN 1 END),
      COUNT(CASE WHEN categoria='medical' THEN 1 END),
      COUNT(*)
    FROM gastos WHERE ${where}
  `, params);

  if (res.length && res[0].values.length) {
    const [food, med, cf, cm, total] = res[0].values[0];
    document.getElementById('sum-food').textContent  = fmtShort(food || 0);
    document.getElementById('sum-med').textContent   = fmtShort(med  || 0);
    document.getElementById('sum-total').textContent = fmt((food||0)+(med||0));
    document.getElementById('cnt-food').textContent  = `${cf||0} registro${cf!==1?'s':''}`;
    document.getElementById('cnt-med').textContent   = `${cm||0} registro${cm!==1?'s':''}`;
    document.getElementById('cnt-total').textContent = `${total||0} en total`;
  }
}

function renderRecords() {
  const mf = getMonthFilter();
  let sql = "SELECT * FROM gastos WHERE 1=1";
  const params = [];
  if (activeCat !== 'all') { sql += " AND categoria=?"; params.push(activeCat === 'med' ? 'medical' : activeCat); }
  if (mf !== 'all') { sql += " AND substr(fecha,1,7)=?"; params.push(mf); }
  sql += " ORDER BY fecha DESC, id DESC";

  const result = db.exec(sql, params);
  const container = document.getElementById('records');
  container.innerHTML = '';

  if (!result.length || !result[0].values.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <p>Sin registros aún.<br>Toca <strong>+ Agregar Gasto</strong> para comenzar.</p>
      </div>`;
    return;
  }

  result[0].values.forEach(([id, fecha, cat, desc, monto], i) => {
    const isFood = cat === 'food';
    const div = document.createElement('div');
    div.className = 'record-item';
    div.style.animationDelay = `${i * 0.04}s`;
    div.innerHTML = `
      <div class="record-dot ${isFood ? 'food' : 'med'}">${isFood ? '🍽' : '🏥'}</div>
      <div class="record-info">
        <div class="record-desc">${desc || '—'}</div>
        <div class="record-date">${fmtDate(fecha)}</div>
      </div>
      <div class="record-right">
        <div class="record-amount ${isFood ? 'food' : 'med'}">${fmt(monto)}</div>
        <button class="btn-del" onclick="deleteRecord(${id})" title="Eliminar">✕</button>
      </div>
    `;
    container.appendChild(div);
  });
}

// ── EXPORT ───────────────────────────────────────────────────
function exportExcel() {
  const mf = getMonthFilter();
  let sql = "SELECT fecha, categoria, descripcion, monto FROM gastos WHERE 1=1";
  const params = [];
  if (activeCat !== 'all') { sql += " AND categoria=?"; params.push(activeCat === 'med' ? 'medical' : activeCat); }
  if (mf !== 'all') { sql += " AND substr(fecha,1,7)=?"; params.push(mf); }
  sql += " ORDER BY fecha DESC";

  const result = db.exec(sql, params);
  if (!result.length || !result[0].values.length) {
    toast('Sin datos para exportar', 'error'); return;
  }

  const rows = result[0].values.map(([f, c, d, m]) => ({
    Fecha: fmtDate(f),
    Categoría: c === 'food' ? 'Alimentación' : 'Seguro Médico',
    Descripción: d || '',
    'Monto (L)': Number(m)
  }));
  const total = rows.reduce((s, r) => s + r['Monto (L)'], 0);
  rows.push({ Fecha: '', Categoría: '', Descripción: 'TOTAL', 'Monto (L)': total });

  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:16},{wch:18},{wch:32},{wch:14}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Gastos');
  XLSX.writeFile(wb, `gastos_${new Date().toISOString().split('T')[0]}.xlsx`);
  toast('📊 Excel descargado', 'success');
}

// ── KEYBOARD ─────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('sheet').classList.contains('open')) addRecord();
  if (e.key === 'Escape') closeSheet();
});

// ── SWIPE DOWN TO CLOSE SHEET ────────────────────────────────
(function() {
  let startY = 0;
  const sheet = document.getElementById('sheet');
  sheet.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
  sheet.addEventListener('touchend', e => {
    if (e.changedTouches[0].clientY - startY > 80) closeSheet();
  }, { passive: true });
})();

// ── START ─────────────────────────────────────────────────────
initDB().catch(console.error);
</script>
